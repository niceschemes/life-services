<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Life Services</title>
</head>

<body>

<h1>Cadastro de Clientes</h1>

<input id="nome" placeholder="Nome"><br><br>
<input id="telefone" placeholder="Telefone"><br><br>
<input id="endereco" placeholder="Endereço"><br><br>

<button onclick="cadastrar()">Cadastrar</button>

<h2>Clientes</h2>
<ul id="lista"></ul>

<script>

const API = "https://life-services-wiq6.onrender.com/clientes";

async function cadastrar() {
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const endereco = document.getElementById('endereco').value.trim();

  // validação (evita lixo no banco)
  if (!nome || !telefone || !endereco) {
    alert("Preencha todos os campos!");
    return;
  }

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nome, telefone, endereco })
  });

  // limpa inputs
  document.getElementById('nome').value = "";
  document.getElementById('telefone').value = "";
  document.getElementById('endereco').value = "";

  carregar();
}

async function carregar() {
  const res = await fetch(API);
  const clientes = await res.json();

  const lista = document.getElementById('lista');
  lista.innerHTML = "";

  clientes.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `
      <b>${c.nome}</b> | ${c.telefone} | ${c.endereco}
    `;
    lista.appendChild(li);
  });
}

// carrega ao abrir
carregar();

</script>

</body>
</html>
