<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Life Services</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>

:root{
  --bg:#0f172a;
  --card:#111827;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --primary:#2563eb;
  --danger:#dc2626;
  --warning:#f59e0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:380px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:30px;
}

.login-card h1{
  font-size:22px;
  margin-bottom:25px;
  text-align:center;
}

/* APP */

.layout{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:230px;
  background:#020617;
  border-right:1px solid var(--border);
  padding:20px;
}

.logo{
  font-size:18px;
  font-weight:600;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:transparent;
  color:var(--muted);
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover{
  background:var(--card);
  color:var(--text);
}

.main{
  flex:1;
  padding:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.card h2{
  font-size:18px;
  margin-bottom:20px;
}

/* INPUTS */

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0b1220;
  color:var(--text);
}

input:focus{
  outline:none;
  border-color:var(--primary);
}

/* BUTTONS */

.btn{
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
  font-size:14px;
}

.btn-primary{
  background:var(--primary);
  color:white;
  width:100%;
}

.btn-warning{
  background:var(--warning);
  color:black;
}

.btn-danger{
  background:var(--danger);
  color:white;
}

/* STATUS */

.status{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

/* TABLE */

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  text-align:left;
  padding:14px;
  font-size:13px;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.table td{
  padding:16px 14px;
  border-bottom:1px solid var(--border);
}

.table tr:hover{
  background:#0b1220;
}

.actions{
  display:flex;
  gap:8px;
}

.small{
  color:var(--muted);
  font-size:13px;
}

  </style>
</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginBox">

  <div class="login-card">

    <h1>Life Services</h1>

    <input id="usuario" placeholder="Usuário">

    <input
      id="senha"
      type="password"
      placeholder="Senha"
    >

    <button class="btn btn-primary" onclick="login()">
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<div class="layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      Life Services
    </div>

    <button>Dashboard</button>
    <button>Clientes</button>
    <button>Serviços</button>
    <button>Financeiro</button>

    <hr style="margin:20px 0;border-color:#1f2937;">

    <button onclick="logout()">
      Sair
    </button>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- TOPO -->

    <div class="card">

      <h2>Dashboard</h2>

      <div class="small">
        Painel geral do sistema
      </div>

    </div>

    <!-- CARDS -->

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:20px;
    ">

      <div class="card">
        <div class="small">Clientes</div>
        <h1 id="totalClientes">0</h1>
      </div>

      <div class="card">
        <div class="small">Serviços</div>
        <h1>12</h1>
      </div>

      <div class="card">
        <div class="small">Financeiro</div>
        <h1>R$ 4.500</h1>
      </div>

    </div>

    <!-- FORM -->

    <div class="card">

      <h2>Novo Cliente</h2>

      <input id="nome" placeholder="Nome">

      <input id="telefone" placeholder="Telefone">

      <input id="endereco" placeholder="Endereço">

      <button
        id="btnSalvar"
        class="btn btn-primary"
        onclick="cadastrar()"
      >
        Salvar
      </button>

      <div class="status" id="status"></div>

    </div>

    <!-- TABELA -->

    <div class="card">

      <h2>Clientes</h2>

      <input
        id="busca"
        placeholder="Buscar cliente..."
        oninput="carregar()"
      >

      <table class="table">

        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Endereço</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="lista"></tbody>

      </table>

    </div>

  </main>

</div>

</div>

<script>

const API = "https://life-services-wiq6.onrender.com/clientes";
const AUTH = "https://life-services-wiq6.onrender.com/auth/login";

let TOKEN = localStorage.getItem("token");
let editando = null;

/* LOGIN */

function checarLogin() {

  TOKEN = localStorage.getItem("token");

  if (!TOKEN) {
    document.getElementById("loginBox").style.display = "flex";
    document.getElementById("app").style.display = "none";
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregar();
}

async function login() {

  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch(AUTH, {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      usuario,
      senha
    })
  });

  const data = await res.json();

  if (data.token) {

    localStorage.setItem("token", data.token);

    location.reload();

  } else {

    alert(data.error || "Login inválido");

  }
}

function logout() {

  localStorage.removeItem("token");

  location.reload();
}

/* FETCH */

async function fetchAuth(url, options = {}) {

  const res = await fetch(url, {
    ...options,
    headers:{
      ...(options.headers || {}),
      "Content-Type":"application/json",
      "Authorization":"Bearer " + TOKEN
    }
  });

  if (res.status === 401) {

    localStorage.removeItem("token");

    document.getElementById("loginBox").style.display = "flex";
    document.getElementById("app").style.display = "none";

    return null;
  }

  return res;
}

/* STATUS */

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

/* CRUD */

async function cadastrar() {

  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const endereco = document.getElementById("endereco").value.trim();

  if (!nome || !telefone || !endereco) {
    alert("Preencha todos os campos");
    return;
  }

  setStatus("Salvando...");

  if (editando) {

    await fetchAuth(API + "/" + editando, {
      method:"PUT",
      body:JSON.stringify({
        nome,
        telefone,
        endereco
      })
    });

    editando = null;

    document.getElementById("btnSalvar").innerText = "Salvar";

  } else {

    await fetchAuth(API, {
      method:"POST",
      body:JSON.stringify({
        nome,
        telefone,
        endereco
      })
    });

  }

  limpar();

  carregar();

  setStatus("Salvo com sucesso");
}

function limpar(){

  document.getElementById("nome").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("endereco").value = "";

}

async function carregar(){

  const res = await fetchAuth(API);

  if (!res) return;

  const clientes = await res.json();

  document.getElementById("totalClientes").innerText = clientes.length;

  const termo = document
    .getElementById("busca")
    .value
    .toLowerCase();

  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  clientes
    .filter(c =>

      c.nome.toLowerCase().includes(termo) ||

      c.telefone.toLowerCase().includes(termo) ||

      c.endereco.toLowerCase().includes(termo)

    )
    .forEach(c => {

      const li = document.createElement("tr");

      li.innerHTML = `
        <td>
          <b>${c.nome}</b>
        </td>

        <td>
          ${c.telefone}
        </td>

        <td>
          ${c.endereco}
        </td>

        <td>

          <div class="actions">

            <button
              class="btn btn-warning"
              onclick="editar('${c._id}', '${c.nome}', '${c.telefone}', '${c.endereco}')"
            >
              Editar
            </button>

            <button
              class="btn btn-danger"
              onclick="deletar('${c._id}')"
            >
              Excluir
            </button>

          </div>

        </td>
      `;

      lista.appendChild(li);

    });

}

function editar(id, nome, telefone, endereco){

  document.getElementById("nome").value = nome;
  document.getElementById("telefone").value = telefone;
  document.getElementById("endereco").value = endereco;

  editando = id;

  document.getElementById("btnSalvar").innerText = "Atualizar";
}

async function deletar(id){

  if (!confirm("Excluir cliente?")) return;

  await fetchAuth(API + "/" + id, {
    method:"DELETE"
  });

  carregar();

  setStatus("Cliente removido");
}

/* START */

checarLogin();

</script>

</body>
</html>
