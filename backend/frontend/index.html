<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Life Services</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1, h2 {
      text-align: center;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .btn-salvar {
      width: 100%;
      background: #007bff;
      color: white;
      margin-top: 10px;
    }

    .btn-edit { background: #ffc107; }
    .btn-delete { background: #dc3545; color: white; }

    ul { list-style: none; padding: 0; }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info { flex: 1; }

    .actions button { margin-left: 5px; }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status {
      text-align: center;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="container" id="loginBox">
  <h2>Login</h2>
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-salvar" onclick="login()">Entrar</button>
</div>

<!-- 🚀 APP -->
<div class="container" id="app" style="display:none;">
  <h1>Life Services</h1>

  <button onclick="logout()" style="background:#333;color:#fff;width:100%;">Sair</button>

  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="endereco" placeholder="Endereço">

  <button id="btnSalvar" class="btn-salvar" onclick="cadastrar()">Salvar</button>

  <div class="top-bar">
    <input id="busca" placeholder="🔍 Buscar cliente..." oninput="carregar()">
  </div>

  <h2>Clientes</h2>
  <ul id="lista"></ul>

  <div class="status" id="status"></div>
</div>

<script>

const API = "https://life-services-wiq6.onrender.com/clientes";
const AUTH = "https://life-services-wiq6.onrender.com/auth/login";

let editando = null;
let TOKEN = localStorage.getItem("token");

// 🔐 controle de acesso
function checarLogin() {
  if (TOKEN) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregar();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
}

// 🔐 login
async function login() {
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;

  const res = await fetch(AUTH, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ usuario, senha })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    location.reload();
  } else {
    alert("Login inválido");
  }
}

// 🔐 logout
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}

async function cadastrar() {
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const endereco = document.getElementById('endereco').value.trim();

  if (!nome || !telefone || !endereco) {
    alert("Preencha todos os campos!");
    return;
  }

  setStatus("Salvando...");

  if (editando) {
    await fetch(API + '/' + editando, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN
      },
      body: JSON.stringify({ nome, telefone, endereco })
    });

    editando = null;
    document.getElementById('btnSalvar').innerText = "Salvar";
  } else {
    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN
      },
      body: JSON.stringify({ nome, telefone, endereco })
    });
  }

  limpar();
  carregar();
  setStatus("✔ Salvo");
}

function limpar() {
  document.getElementById('nome').value = "";
  document.getElementById('telefone').value = "";
  document.getElementById('endereco').value = "";
}

async function carregar() {
  const res = await fetch(API, {
    headers: {
      "Authorization": "Bearer " + TOKEN
    }
  });

  const clientes = await res.json();

  const termo = document.getElementById('busca').value.toLowerCase();

  const lista = document.getElementById('lista');
  lista.innerHTML = "";

  clientes
    .filter(c =>
      c.nome.toLowerCase().includes(termo) ||
      c.telefone.toLowerCase().includes(termo) ||
      c.endereco.toLowerCase().includes(termo)
    )
    .forEach(c => {
      const li = document.createElement('li');

      li.innerHTML = `
        <div class="info">
          <b>${c.nome}</b><br>
          ${c.telefone}<br>
          ${c.endereco}
        </div>

        <div class="actions">
          <button class="btn-edit" onclick="editar('${c._id}', '${c.nome}', '${c.telefone}', '${c.endereco}')">✏️</button>
          <button class="btn-delete" onclick="deletar('${c._id}')">🗑️</button>
        </div>
      `;

      lista.appendChild(li);
    });
}

function editar(id, nome, telefone, endereco) {
  document.getElementById('nome').value = nome;
  document.getElementById('telefone').value = telefone;
  document.getElementById('endereco').value = endereco;

  editando = id;
  document.getElementById('btnSalvar').innerText = "Atualizar";
}

async function deletar(id) {
  if (!confirm("Tem certeza que deseja excluir?")) return;

  await fetch(API + '/' + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + TOKEN
    }
  });

  setStatus("🗑️ Removido");
  carregar();
}

// inicia
checarLogin();

</script>

</body>
</html>
