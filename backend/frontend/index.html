<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Life Services</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>
:root {
  --bg: #0f172a;
  --sidebar: #020617;
  --card: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --primary: #2563eb;
  --danger: #dc2626;
  --warning: #f59e0b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* layout */
.layout {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 220px;
  background: var(--sidebar);
  padding: 20px;
  border-right: 1px solid var(--border);
}

.sidebar h1 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  background: none;
  border: none;
  color: var(--muted);
  text-align: left;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.sidebar button:hover {
  background: var(--card);
  color: var(--text);
}

/* main */
.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

/* cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.card h2 {
  font-size: 16px;
  margin-bottom: 15px;
  font-weight: 500;
}

/* inputs */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}

input:focus {
  outline: none;
  border-color: var(--primary);
}

/* buttons */
.btn {
  padding: 10px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-warning {
  background: var(--warning);
}

.btn-danger {
  background: var(--danger);
  color: white;
}

/* list */
ul {
  list-style: none;
}

li {
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions button {
  margin-left: 5px;
}

/* subtle text */
.small {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>
 <body>

<div class="layout">

  <div class="sidebar">
    <h1>Life Services</h1>
    <button onclick="logout()">Sair</button>
  </div>

  <div class="main">

    <div class="card">
      <h2>Novo Cliente</h2>

      <input id="nome" placeholder="Nome">
      <input id="telefone" placeholder="Telefone">
      <input id="endereco" placeholder="Endereço">

      <button class="btn btn-primary" onclick="cadastrar()">Salvar</button>
    </div>

    <div class="card">
      <h2>Clientes</h2>
      <ul id="lista"></ul>
    </div>

  </div>

</div>


<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>Login</h2>
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-salvar" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">
  <h1>Life Services</h1>

  <button onclick="logout()" style="background:#333;color:#fff;width:100%;">Sair</button>

  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="endereco" placeholder="Endereço">

  <button id="btnSalvar" class="btn-salvar" onclick="cadastrar()">Salvar</button>

  <div class="top-bar">
    <input id="busca" placeholder="🔍 Buscar..." oninput="carregar()">
  </div>

  <h2>Clientes</h2>
  <ul id="lista"></ul>

  <div class="status" id="status"></div>
</div>

<script>

const API = "https://life-services-wiq6.onrender.com/clientes";
const AUTH = "https://life-services-wiq6.onrender.com/auth/login";

let editando = null;
let TOKEN = localStorage.getItem("token");

// 🔐 verifica login
function checarLogin() {

  TOKEN = localStorage.getItem("token");

  if (!TOKEN) {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregar();
}

// 🔐 login JWT
async function login() {
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;

  const res = await fetch(AUTH, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ usuario, senha })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    location.reload();
  } else {
    alert(data.error || "Erro no login");
  }
}

// 🔐 logout
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// 🚨 fetch protegido
async function fetchAuth(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      "Authorization": "Bearer " + TOKEN,
      "Content-Type": "application/json"
    }
  });

  if (res.status === 401) {
    alert("Sessão expirada. Faça login novamente.");
    logout();
    return null;
  }

  return res;
}

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}

// CRUD
async function cadastrar() {
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const endereco = document.getElementById('endereco').value.trim();

  if (!nome || !telefone || !endereco) {
    alert("Preencha tudo");
    return;
  }

  setStatus("Salvando...");

  if (editando) {
    await fetchAuth(API + '/' + editando, {
      method: "PUT",
      body: JSON.stringify({ nome, telefone, endereco })
    });

    editando = null;
    document.getElementById('btnSalvar').innerText = "Salvar";
  } else {
    await fetchAuth(API, {
      method: "POST",
      body: JSON.stringify({ nome, telefone, endereco })
    });
  }

  limpar();
  carregar();
  setStatus("✔ OK");
}

function limpar() {
  document.getElementById('nome').value = "";
  document.getElementById('telefone').value = "";
  document.getElementById('endereco').value = "";
}

async function carregar() {
  const res = await fetchAuth(API);
  if (!res) return;

  const clientes = await res.json();
  const termo = document.getElementById('busca').value.toLowerCase();

  const lista = document.getElementById('lista');
  lista.innerHTML = "";

  clientes
    .filter(c =>
      c.nome.toLowerCase().includes(termo) ||
      c.telefone.toLowerCase().includes(termo) ||
      c.endereco.toLowerCase().includes(termo)
    )
    .forEach(c => {
      const li = document.createElement('li');

      li.innerHTML = `
        <div>
          <b>${c.nome}</b><br>
          ${c.telefone}<br>
          ${c.endereco}
        </div>

        <div>
          <button class="btn-edit" onclick="editar('${c._id}', '${c.nome}', '${c.telefone}', '${c.endereco}')">✏️</button>
          <button class="btn-delete" onclick="deletar('${c._id}')">🗑️</button>
        </div>
      `;

      lista.appendChild(li);
    });
}

function editar(id, nome, telefone, endereco) {
  document.getElementById('nome').value = nome;
  document.getElementById('telefone').value = telefone;
  document.getElementById('endereco').value = endereco;

  editando = id;
  document.getElementById('btnSalvar').innerText = "Atualizar";
}

async function deletar(id) {
  if (!confirm("Excluir?")) return;

  await fetchAuth(API + '/' + id, { method: "DELETE" });

  setStatus("🗑️ Removido");
  carregar();
}

// start
checarLogin();

</script>

</body>
</html>
