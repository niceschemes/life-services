<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Life Services</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>

:root{
  --bg:#0f172a;
  --sidebar:#020617;
  --card:#111827;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --danger:#dc2626;
  --danger-hover:#b91c1c;
  --warning:#f59e0b;
  --warning-hover:#d97706;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    radial-gradient(circle at top,#1e293b 0%,#0f172a 60%);
}

.login-card{
  width:100%;
  max-width:400px;
  background:rgba(17,24,39,0.95);
  border:1px solid var(--border);
  border-radius:18px;
  padding:35px;
  backdrop-filter:blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.login-card h1{
  font-size:28px;
  margin-bottom:10px;
  text-align:center;
}

.login-card p{
  text-align:center;
  color:var(--muted);
  margin-bottom:25px;
  font-size:14px;
}

/* APP */

.layout{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:250px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  padding:24px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:35px;
}

.sidebar button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--muted);
  text-align:left;
  cursor:pointer;
  transition:0.2s;
  margin-bottom:8px;
  font-size:14px;
}

.sidebar button:hover{
  background:#111827;
  color:white;
}

.logout{
  margin-top:auto;
}

/* MAIN */

.main{
  flex:1;
  padding:30px;
}

/* HEADER */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.topbar h1{
  font-size:28px;
}

.topbar p{
  color:var(--muted);
  margin-top:5px;
}

/* CARDS */

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
}

.card h2{
  font-size:18px;
  margin-bottom:18px;
}

.stat-title{
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
}

.stat-number{
  font-size:34px;
  font-weight:700;
}

/* FORM */

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:var(--primary);
}

/* BUTTONS */

.btn{
  border:none;
  border-radius:10px;
  padding:12px 16px;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
  font-weight:600;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-primary:hover{
  background:var(--primary-hover);
}

.btn-warning{
  background:var(--warning);
  color:black;
}

.btn-warning:hover{
  background:var(--warning-hover);
}

.btn-danger{
  background:var(--danger);
  color:white;
}

.btn-danger:hover{
  background:var(--danger-hover);
}

/* STATUS */

.status{
  margin-top:15px;
  color:var(--muted);
  font-size:13px;
}

/* TABLE */

.table-wrapper{
  overflow:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  text-align:left;
  padding:16px;
  color:var(--muted);
  font-size:13px;
  border-bottom:1px solid var(--border);
}

.table td{
  padding:18px 16px;
  border-bottom:1px solid var(--border);
}

.table tr:hover{
  background:#0b1220;
}

.actions{
  display:flex;
  gap:8px;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  backdrop-filter:blur(4px);
}

.modal-content{
  width:100%;
  max-width:500px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:25px;
  animation:modalOpen 0.2s ease;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:22px;
  cursor:pointer;
}

.close-btn:hover{
  color:white;
}

@keyframes modalOpen{

  from{
    opacity:0;
    transform:scale(0.95);
  }

  to{
    opacity:1;
    transform:scale(1);
  }

}

.small{
  color:var(--muted);
  font-size:13px;
}

@media(max-width:900px){

  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

}

  </style>

</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginBox">

  <div class="login-card">

    <h1>Life Services</h1>

    <p>
      Sistema de gerenciamento empresarial
    </p>

    <input
      id="usuario"
      placeholder="Usuário"
    >

    <br><br>

    <input
      id="senha"
      type="password"
      placeholder="Senha"
    >

    <br><br>

    <button
      class="btn btn-primary"
      style="width:100%;"
      onclick="login()"
    >
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="logo">
        Life Services
      </div>

      <button>Dashboard</button>

      <button>Clientes</button>

      <button>Serviços</button>

      <button>Financeiro</button>

      <button>Relatórios</button>

      <button class="logout" onclick="logout()">
        Sair
      </button>

    </aside>

    <!-- MAIN -->

    <main class="main">

      <!-- TOPBAR -->

      <div class="topbar">

        <div>
          <h1>Dashboard</h1>

          <p>
            Painel administrativo do sistema
          </p>
        </div>

      </div>

      <!-- STATS -->

      <div class="stats">

        <div class="card">

          <div class="stat-title">
            Clientes
          </div>

          <div
            class="stat-number"
            id="totalClientes"
          >
            0
          </div>

        </div>

        <div class="card">

          <div class="stat-title">
            Serviços
          </div>

          <div class="stat-number">
            12
          </div>

        </div>

        <div class="card">

          <div class="stat-title">
            Financeiro
          </div>

          <div class="stat-number">
            R$ 4.500
          </div>

        </div>

      </div>

      <!-- FORM -->

      <div class="card">

        <h2>Novo Cliente</h2>

        <div class="form-grid">

          <input
            id="nome"
            placeholder="Nome"
          >

          <input
            id="telefone"
            placeholder="Telefone"
          >

          <input
            id="endereco"
            placeholder="Endereço"
          >

        </div>

        <br>

        <button
          id="btnSalvar"
          class="btn btn-primary"
          onclick="cadastrar()"
        >
          Salvar
        </button>

        <div
          class="status"
          id="status"
        ></div>

      </div>

      <!-- CLIENTES -->

      <div class="card">

        <h2>Clientes</h2>

        <input
          id="busca"
          placeholder="Buscar cliente..."
          oninput="carregar()"
        >

        <br><br>

        <div class="table-wrapper">

          <table class="table">

            <thead>

              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>Ações</th>
              </tr>

            </thead>

            <tbody id="lista"></tbody>

          </table>

        </div>

      </div>

    </main>

  </div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

  <div class="modal-content">

    <div class="modal-header">

      <h2>Editar Cliente</h2>

      <button
        class="close-btn"
        onclick="fecharModal()"
      >
        ✕
      </button>

    </div>

    <input
      id="editNome"
      placeholder="Nome"
    >

    <br><br>

    <input
      id="editTelefone"
      placeholder="Telefone"
    >

    <br><br>

    <input
      id="editEndereco"
      placeholder="Endereço"
    >

    <br><br>

    <button
      class="btn btn-primary"
      onclick="salvarEdicao()"
    >
      Salvar Alterações
    </button>

  </div>

</div>

<script>

const API =
"https://life-services-wiq6.onrender.com/clientes";

const AUTH =
"https://life-services-wiq6.onrender.com/auth/login";

let TOKEN = localStorage.getItem("token");

let editando = null;

/* LOGIN */

function checarLogin(){

  TOKEN = localStorage.getItem("token");

  if(!TOKEN){

    document.getElementById("loginBox").style.display = "flex";

    document.getElementById("app").style.display = "none";

    return;

  }

  document.getElementById("loginBox").style.display = "none";

  document.getElementById("app").style.display = "block";

  carregar();

}

async function login(){

  const usuario =
  document.getElementById("usuario").value;

  const senha =
  document.getElementById("senha").value;

  const res = await fetch(AUTH,{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      usuario,
      senha
    })

  });

  const data = await res.json();

  if(data.token){

    localStorage.setItem("token",data.token);

    location.reload();

  }else{

    alert(data.error || "Login inválido");

  }

}

function logout(){

  localStorage.removeItem("token");

  location.reload();

}

/* FETCH */

async function fetchAuth(url,options = {}){

  const res = await fetch(url,{

    ...options,

    headers:{
      ...(options.headers || {}),
      "Content-Type":"application/json",
      "Authorization":"Bearer " + TOKEN
    }

  });

  if(res.status === 401){

    localStorage.removeItem("token");

    document.getElementById("loginBox").style.display = "flex";

    document.getElementById("app").style.display = "none";

    return null;

  }

  return res;

}

/* STATUS */

function setStatus(msg){

  document.getElementById("status").innerText = msg;

}

/* CRUD */

async function cadastrar(){

  const nome =
  document.getElementById("nome").value.trim();

  const telefone =
  document.getElementById("telefone").value.trim();

  const endereco =
  document.getElementById("endereco").value.trim();

  if(!nome || !telefone || !endereco){

    alert("Preencha todos os campos");

    return;

  }

  setStatus("Salvando...");

  await fetchAuth(API,{

    method:"POST",

    body:JSON.stringify({
      nome,
      telefone,
      endereco
    })

  });

  limpar();

  carregar();

  setStatus("Cliente salvo");

}

function limpar(){

  document.getElementById("nome").value = "";

  document.getElementById("telefone").value = "";

  document.getElementById("endereco").value = "";

}

async function carregar(){

  const res = await fetchAuth(API);

  if(!res) return;

  const clientes = await res.json();

  document.getElementById("totalClientes")
  .innerText = clientes.length;

  const termo =
  document.getElementById("busca")
  .value
  .toLowerCase();

  const lista =
  document.getElementById("lista");

  lista.innerHTML = "";

  clientes
  .filter(c =>

    c.nome.toLowerCase().includes(termo) ||

    c.telefone.toLowerCase().includes(termo) ||

    c.endereco.toLowerCase().includes(termo)

  )

  .forEach(c => {

    const tr = document.createElement("tr");

    tr.innerHTML = `

      <td>
        <b>${c.nome}</b>
      </td>

      <td>
        ${c.telefone}
      </td>

      <td>
        ${c.endereco}
      </td>

      <td>

        <div class="actions">

          <button
            class="btn btn-warning"
            onclick="editar(
              '${c._id}',
              '${c.nome}',
              '${c.telefone}',
              '${c.endereco}'
            )"
          >
            Editar
          </button>

          <button
            class="btn btn-danger"
            onclick="deletar('${c._id}')"
          >
            Excluir
          </button>

        </div>

      </td>

    `;

    lista.appendChild(tr);

  });

}

/* EDITAR */

function editar(id,nome,telefone,endereco){

  document.getElementById("modal").style.display = "flex";

  document.getElementById("editNome").value = nome;

  document.getElementById("editTelefone").value = telefone;

  document.getElementById("editEndereco").value = endereco;

  editando = id;

}

function fecharModal(){

  document.getElementById("modal").style.display = "none";

}

async function salvarEdicao(){

  const nome =
  document.getElementById("editNome")
  .value
  .trim();

  const telefone =
  document.getElementById("editTelefone")
  .value
  .trim();

  const endereco =
  document.getElementById("editEndereco")
  .value
  .trim();

  await fetchAuth(API + "/" + editando,{

    method:"PUT",

    body:JSON.stringify({
      nome,
      telefone,
      endereco
    })

  });

  fecharModal();

  carregar();

  setStatus("Cliente atualizado");

}

/* DELETE */

async function deletar(id){

  if(!confirm("Excluir cliente?")) return;

  await fetchAuth(API + "/" + id,{

    method:"DELETE"

  });

  carregar();

  setStatus("Cliente removido");

}

/* START */

checarLogin();

</script>

</body>
</html>
